# =============================================================================
# dbt_project.yml — rtl_rdp_client (Retail Data Platform - Client Layer)
# =============================================================================
# This file is the central configuration for the rtl_rdp_client dbt project.
# This project is CUSTOMER-OWNED and controlled. It contains two layers:
#   1. staging — maps customer source data to the RDP contract schema
#   2. client  — customer's own custom tables and views
# Environment-specific dataset names are resolved at runtime via the
# generate_schema_name macro, which prepends the target name (dev/tst/prd).
# =============================================================================

name: 'rtl_rdp_client'
version: '1.0.0'

# Profile name must match the entry in ~/.dbt/profiles.yml
profile: 'rtl_rdp_client'

# =============================================================================
# File Path Configuration
# Defines where dbt looks for each type of file in the project.
# These follow dbt conventions and should not need to change.
# =============================================================================
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

# Directories removed when running dbt clean
clean-targets:
  - "target"       # compiled SQL and run artifacts
  - "dbt_packages" # installed dbt packages

# =============================================================================
# Model Layer Configuration
# Each layer maps to a BigQuery dataset and materialization strategy.
# Dataset names are prefixed with the environment at runtime:
#   dev_rdp_staging, tst_rdp_staging, prd_rdp_staging etc.
# Owner indicates who is responsible for maintaining each layer.
#
# Layer dependency chain:
#   staging → [consumed by rtl_rdp via source()]
#   client  → [customer's own content, not consumed by rtl_rdp]
#
# Access rules:
#   - Customers own and maintain all models in this project
#   - RDP product reads from rdp_staging via source() only
#   - No direct dependencies on rtl_rdp models allowed
# =============================================================================

models:
  rtl_rdp_client:

    staging:
      # PURPOSE: Customer-controlled mapping layer. Translates customer source
      # data from landing into the RDP contract schema. Views only — no data
      # storage cost. Must satisfy the RDP staging contract defined in
      # the RDP product documentation.
      # OWNER: Customer
      # DATASET: {env}_rdp_staging
      # READS FROM: landing (customer source tables)
      # CONSUMED BY: rtl_rdp project via source() declarations
      +materialized: view
      +schema: rdp_staging

    client:
      # PURPOSE: Optional customer-owned tables and views. Customers can add
      # any custom models here that are specific to their implementation.
      # Not consumed by rtl_rdp product. No restrictions on content.
      # OWNER: Customer
      # DATASET: {env}_rdp_client
      # READS FROM: any source
      +materialized: table
      +schema: rdp_client
